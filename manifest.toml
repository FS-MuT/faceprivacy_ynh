#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "faceprivacy"
name = "FacePrivacy"
description.en = "Face Blurring Application"
description.fr = "Application de Floutage de Visages"
description.de = "Anwendung zur Gesichtsverpixelung"

version = "2025.08.25~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "MIT"
website = "https://faceprivacy.forge.apps.education.fr/app/"
demo = "https://faceprivacy.forge.apps.education.fr/app/"
code = "https://github.com/FS-MuT/faceprivacy-de"

[integration]
yunohost = ">= 12.0.9"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "500M"
ram.build = "70M"
ram.runtime = "30M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/faceprivacy"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/FS-MuT/faceprivacy-de/archive/refs/heads/main.tar.gz"
    sha256 = "589e06efb2ed1895e5bfe3a0827ae3d37a20fb4329ce45ca862902cdc9d0fec1"

    autoupdate.strategy = "latest_github_branch"
    autoupdate.branch = "main"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"
